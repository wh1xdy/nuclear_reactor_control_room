name: build & test

# The app uses macOS 26 (Tahoe) Liquid Glass APIs, so it needs the macOS 26
# SDK / Xcode 26 — which only the macos-26 GitHub-hosted runner provides.
on:
  push:
    branches: [master, macos-swift, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: swift build & test (macOS 26)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
